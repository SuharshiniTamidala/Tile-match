<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tile-Match Memory Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #f5c518;
    --gold2: #e0a000;
    --dark: #0a0a0f;
    --card-w: 110px;
    --card-h: 110px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    background: #000;
  }

  /* ========================= PAGE 1 – HOME ========================= */
  #page-home {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: url('assets/bg-home.jpg') center/cover no-repeat;
    transition: opacity 0.6s ease;
  }
  #page-home::before {
    content:''; position:absolute; inset:0;
    background: rgba(0,0,0,0.45);
  }
  .home-content {
    position: relative; z-index: 2; text-align: center;
    display: flex; flex-direction: column; align-items: center;
  }

  #logo {
    width: clamp(320px, 62vw, 680px);
    display: block;
    animation: logoPulse 2.8s ease-in-out infinite;
    filter: drop-shadow(0 0 38px #f5c518bb);
  }
  @keyframes logoPulse {
    0%,100% { transform: scale(1);    filter: drop-shadow(0 0 38px #f5c518bb); }
    50%      { transform: scale(1.10); filter: drop-shadow(0 0 70px #f5c518ff); }
  }

  #btn-start {
    margin-top: 44px;
    padding: 18px 72px;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1.25rem; letter-spacing: 3px;
    color: #0a0a0f; background: linear-gradient(135deg,#f5c518,#e0a000);
    border: none; border-radius: 6px; cursor: pointer;
    box-shadow: 0 0 30px #f5c51888, 0 4px 20px #0008;
    transition: transform .15s, box-shadow .15s;
  }
  #btn-start:hover { transform: scale(1.06); box-shadow: 0 0 48px #f5c518cc; }
  #btn-start:active { transform: scale(0.97); }

  /* ========================= PAGE 2 – DIFFICULTY ========================= */
  #page-diff {
    position: absolute; inset: 0; z-index: 20;
    pointer-events: none;
    display: flex; align-items: flex-end; justify-content: center;
  }
  #diff-panel {
    width: min(480px, 92vw);
    background: linear-gradient(160deg, #13131fee, #0d0d18f5);
    border: 2px solid #f5c51866;
    border-radius: 18px 18px 0 0;
    padding: 46px 36px 52px;
    text-align: center;
    transform: translateY(100%);
    transition: transform 0.55s cubic-bezier(.22,1,.36,1);
    box-shadow: 0 -10px 60px #f5c51822, 0 -2px 40px #0009;
    backdrop-filter: blur(4px);
  }
  #page-diff.open { pointer-events: all; }
  #page-diff.open #diff-panel { transform: translateY(0); }

  #diff-panel h2 {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold); font-size: 1.6rem; margin-bottom: 10px;
    text-shadow: 0 0 16px #f5c51888;
  }
  #diff-panel p { color: #aaa; margin-bottom: 30px; font-size: 1rem; }

  .diff-btn {
    display: block; width: 100%; margin: 12px 0;
    padding: 14px; border: 2px solid;
    border-radius: 8px; cursor: pointer;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1rem; letter-spacing: 2px;
    transition: all .2s;
    background: transparent;
  }
  .diff-btn.easy   { border-color: #4ade80; color: #4ade80; }
  .diff-btn.medium { border-color: var(--gold); color: var(--gold); }
  .diff-btn.hard   { border-color: #f87171; color: #f87171; }
  .diff-btn:hover  { transform: scale(1.04); box-shadow: 0 0 18px currentColor; }

  /* blur home when diff open */
  #page-home.blurred { filter: blur(4px) brightness(0.7); }

  /* ========================= PAGE 3 – GAME (DOORS) ========================= */
  #page-game {
    position: absolute; inset: 0; z-index: 30;
    background: url('assets/game-bg.jpg') center/cover no-repeat;
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; pointer-events: none;
  }
  #page-game.active { opacity:1; pointer-events:all; }

  /* Doors */
  #door-left, #door-right {
    position: absolute; top:0; bottom:0; width:50%;
    z-index: 50;
    background: linear-gradient(135deg,#1a1228,#0d0d18);
    display:flex; align-items:center; justify-content:center;
    transition: transform 1.1s cubic-bezier(.77,0,.18,1);
  }
  #door-left  { left:0;  border-right:3px solid #f5c51888; }
  #door-right { right:0; border-left: 3px solid #f5c51888; }
  #door-left  .door-emblem,
  #door-right .door-emblem {
    font-size:5rem; opacity:.18;
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    pointer-events:none;
  }
  #door-left.open  { transform: translateX(-100%); }
  #door-right.open { transform: translateX(100%); }

  /* game inner */
  #game-inner {
    position:relative; z-index:40;
    width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding: 14px 10px 10px;
  }
  #game-hud {
    display:flex; gap:20px; align-items:center; margin-bottom:12px;
    color: var(--gold);
    font-family: 'Cinzel Decorative',cursive;
    font-size:.85rem; letter-spacing:1px;
    flex-shrink:0;
  }
  #game-hud span { background:#0009; border:1px solid #f5c51844; padding:5px 14px; border-radius:6px; }

  /* brown transparent backdrop that fills remaining space behind cards */
  #card-wrap {
    flex:1; width:100%;
    display:flex; align-items:center; justify-content:center;
    padding: 0 6px 6px;
  }
  #card-backdrop {
    display:inline-flex; align-items:center; justify-content:center;
    background: rgba(101, 56, 10, 0.55);
    border-radius: 18px;
    padding: 18px 22px;
    box-shadow: 0 0 60px rgba(80,35,0,0.7), inset 0 0 30px rgba(0,0,0,0.3);
    border: 1.5px solid rgba(180,100,20,0.38);
    backdrop-filter: blur(2px);
    width: 100%;
    box-sizing: border-box;
  }

  /* card grid */
  #card-grid {
    display:grid;
    gap:clamp(6px, 1.2vw, 12px);
    perspective:800px;
    justify-content: center;
    align-content: center;
  }

  .card {
    width: var(--card-w); height: var(--card-h);
    cursor:pointer;
    transform-style: preserve-3d;
    transition: transform .5s ease;
    border-radius:10px;
    position:relative;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched { transform: rotateY(180deg); pointer-events:none; }
  .card.matched .card-front { box-shadow: 0 0 18px #4ade8088; border-color:#4ade80; }
  .card.shake {
    animation: shake .4s ease;
  }
  @keyframes shake {
    0%,100%{transform:rotateY(180deg) translateX(0)}
    25%{transform:rotateY(180deg) translateX(-7px)}
    75%{transform:rotateY(180deg) translateX(7px)}
  }

  .card-face {
    position:absolute; inset:0; border-radius:10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow:hidden;
  }
  .card-back {
    background: url('assets/card-back.png') center/cover no-repeat;
    border:2px solid #f5c51866;
    box-shadow: 0 4px 16px #0008;
  }
  .card-front {
    transform: rotateY(180deg);
    border:2px solid #f5c51888;
    background: url('assets/game-bg.jpg') center/cover;
    box-shadow:0 4px 16px #0006;
  }
  .card-front img { width:100%; height:100%; object-fit:cover; border-radius:8px; }

  /* ========================= RESULT OVERLAY ========================= */
  #result-overlay {
    position:absolute; inset:0; z-index:60;
    display:flex; align-items:center; justify-content:center;
    background:#0009;
    pointer-events:none; opacity:0;
    transition: opacity .4s;
    backdrop-filter: blur(3px);
  }
  #result-overlay.show { opacity:1; pointer-events:all; }

  #result-panel {
    background:linear-gradient(145deg,#1a1228,#0d0d18);
    border:2px solid var(--gold);
    border-radius:16px; padding:44px 50px; text-align:center;
    box-shadow:0 0 60px #f5c51844;
    transform:scale(.6);
    transition:transform .5s cubic-bezier(.22,1,.36,1);
  }
  #result-overlay.show #result-panel { transform:scale(1); }
  #result-panel h2 { font-family:'Cinzel Decorative',cursive; color:var(--gold); font-size:2rem; margin-bottom:8px; }
  #result-panel p  { color:#aaa; margin-bottom:28px; font-size:1.1rem; }

  .res-btn {
    display:inline-block; margin:8px;
    padding:12px 28px; border-radius:8px; border:2px solid;
    cursor:pointer; font-family:'Cinzel Decorative',cursive;
    font-size:.9rem; background:transparent; transition:all .2s;
  }
  #btn-restart   { border-color:var(--gold);  color:var(--gold); }
  #btn-chgdiff   { border-color:#60a5fa;       color:#60a5fa; }
  #btn-exit      { border-color:#f87171;        color:#f87171; }
  .res-btn:hover { box-shadow:0 0 18px currentColor; transform:scale(1.06); }

  /* door-close animation for result => exit */
  #page-game.closing #door-left,
  #page-game.closing #door-right { transition:transform .9s cubic-bezier(.77,0,.18,1); }
  #page-game.closing #door-left  { transform:translateX(0)!important; }
  #page-game.closing #door-right { transform:translateX(0)!important; }

  /* ========================= MISC ========================= */
  #vol-ctrl {
    position:fixed; bottom:16px; right:16px; z-index:100;
    display:flex; align-items:center; gap:8px;
    background:#0009; border:1px solid #f5c51844;
    border-radius:30px; padding:6px 14px;
  }
  #vol-ctrl label { color:#f5c518; font-size:.8rem; font-family:'Rajdhani',sans-serif; }
  #vol-slider { width:80px; accent-color:#f5c518; }

  .hidden { display:none!important; }
</style>
</head>
<body>

<!-- ══════════════════ PAGE 1 – HOME ══════════════════ -->
<div id="page-home">
  <div class="home-content">
    <img id="logo" src="assets/logo.png" alt="Tile-Match Logo"
         onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'"/>
    <h1 id="logo-text" style="display:none;font-family:'Cinzel Decorative',cursive;color:#f5c518;font-size:3rem;
        text-shadow:0 0 40px #f5c518;animation:logoPulse 2.8s ease-in-out infinite;">TILE-MATCH</h1>
    <button id="btn-start">▶ START</button>
  </div>
</div>

<!-- ══════════════════ PAGE 2 – DIFFICULTY ══════════════════ -->
<div id="page-diff">
  <div id="diff-panel">
    <h2>Choose Difficulty</h2>
    <p>How sharp is your memory today?</p>
    <button class="diff-btn easy"   data-diff="easy">🌿 EASY &nbsp;(4×3)</button>
    <button class="diff-btn medium" data-diff="medium">⚡ MEDIUM (4×4)</button>
    <button class="diff-btn hard"   data-diff="hard">💀 HARD &nbsp;(5×4)</button>
  </div>
</div>

<!-- ══════════════════ PAGE 3 – GAME ══════════════════ -->
<div id="page-game">
  <div id="door-left"><div class="door-emblem">✦</div></div>
  <div id="door-right"><div class="door-emblem">✦</div></div>

  <div id="game-inner">
    <div id="game-hud">
      <span id="hud-diff">EASY</span>
      <span>MOVES: <b id="hud-moves">0</b></span>
      <span>PAIRS: <b id="hud-pairs">0</b>/<b id="hud-total">6</b></span>
      <span>⏱ <b id="hud-time">0:00</b></span>
    </div>
    <div id="card-wrap">
      <div id="card-backdrop">
        <div id="card-grid"></div>
      </div>
    </div>
  </div>

  <!-- RESULT OVERLAY -->
  <div id="result-overlay">
    <div id="result-panel">
      <h2 id="res-title">🎉 You Win!</h2>
      <p id="res-stats">Moves: 0 &nbsp;|&nbsp; Time: 0:00</p>
      <button class="res-btn" id="btn-restart">↺ RESTART</button>
      <button class="res-btn" id="btn-chgdiff">⚙ DIFFICULTY</button>
      <button class="res-btn" id="btn-exit">✕ EXIT</button>
    </div>
  </div>
</div>

<!-- Volume control -->
<div id="vol-ctrl">
  <label>🔊</label>
  <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.6"/>
</div>

<!-- AUDIO -->
<audio id="snd-home"  src="assets/home-music.mp3"  loop></audio>
<audio id="snd-game"  src="assets/game-music.mp3"  loop></audio>
<audio id="snd-start" src="assets/start-click.mp3"></audio>
<audio id="snd-match" src="assets/match.mp3"></audio>
<audio id="snd-wrong" src="assets/wrong.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
